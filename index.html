// PB ENGINE
// ============================================================
const PBEngine = {
  checkPB(exerciseId, kg, reps) {
    const ex = Store.getExercise(exerciseId);
    if (!ex) return { isNewPb: false };
    kg = parseFloat(kg) || 0;
    reps = parseInt(reps) || 0;
    if (!ex.pb) return { isNewPb: (kg > 0 || reps > 0), oldPb: null };
    const exType = ex.type || 'strength';
    if (exType === 'cardio') {
      // For cardio: field1 (mins/secs) stored in kg, field2 (km/incline) stored in reps
      // PB = longer duration OR same duration with higher field2
      const isNew = (kg > ex.pb.kg) || (kg === ex.pb.kg && reps > ex.pb.reps);
      return { isNewPb: isNew, oldPb: {...ex.pb} };
    }
    if (exType === 'bodyweight') {
      // Bodyweight: only reps matter (kg=0)
      return { isNewPb: reps > ex.pb.reps, oldPb: {...ex.pb} };
    }
    // Strength: heavier weight wins, or same weight with more reps
    const isNew = (kg > ex.pb.kg) || (kg === ex.pb.kg && reps > ex.pb.reps);
    return { isNewPb: isNew, oldPb: {...ex.pb} };
  },

  recordPB(exerciseId, kg, reps, date) {
    const ex = Store.getExercise(exerciseId);
    if (!ex) return;
    const newPb = { kg: parseFloat(kg)||0, reps: parseInt(reps)||0, date: date || new Date().toISOString().slice(0,10) };
    ex.pbHistory.push(newPb);
    ex.pb = newPb;
    Store.save();
  }
};

// SESSION MANAGER
// ============================================================
const SessionManager = {
  timerInterval: null,

  startSession(workoutDayId) {
    const day = Store.getWorkoutDay(workoutDayId);
    if (!day) return;
    Store.data.activeSession = {
      id: 'sess-' + Date.now(),
      workoutDayId,
      startTime: Date.now(),
      exercises: day.exerciseIds.map(eid => ({
        exerciseId: eid,
        sets: [{ kg: '', reps: '', completed: false, isNewPb: false }],
        newPb: false
      })),
      totalVolume: 0,
      pbsAchieved: 0
    };
    Store.save();
  },

  getActive() { return Store.data.activeSession; },

  addSet(exerciseId) {
    const session = this.getActive();
    if (!session) return;
    const ex = session.exercises.find(e => e.exerciseId === exerciseId);
    if (ex) {
      ex.sets.push({ kg: '', reps: '', completed: false, isNewPb: false });
      Store.save();
    }
  },

  removeSet(exerciseId, setIndex) {
    const session = this.getActive();
    if (!session) return;
    const ex = session.exercises.find(e => e.exerciseId === exerciseId);
    if (ex && ex.sets.length > 1) {
      ex.sets.splice(setIndex, 1);
      Store.save();
    }
  },

  updateSet(exerciseId, setIndex, field, value) {
    const session = this.getActive();
    if (!session) return;
    const ex = session.exercises.find(e => e.exerciseId === exerciseId);
    if (ex && ex.sets[setIndex]) {
      ex.sets[setIndex][field] = value;
      Store.save();
    }
  },

  completeSet(exerciseId, setIndex) {
    const session = this.getActive();
    if (!session) return { isNewPb: false };
    const ex = session.exercises.find(e => e.exerciseId === exerciseId);
    if (!ex || !ex.sets[setIndex]) return { isNewPb: false };
    const set = ex.sets[setIndex];
    set.completed = !set.completed;
    if (set.completed) {
      const ex = Store.getExercise(exerciseId);
      const exType = ex?.type || 'strength';
      const result = PBEngine.checkPB(exerciseId, set.kg, set.reps);
      const hasData = exType === 'bodyweight' ? set.reps !== '' : (exType === 'cardio' ? set.kg !== '' : (set.kg !== '' && set.reps !== ''));
      if (result.isNewPb && hasData) {
        set.isNewPb = true;
        ex.newPb = true;
        session.pbsAchieved = session.exercises.filter(e => e.newPb).length;
        PBEngine.recordPB(exerciseId, set.kg, set.reps);
      }
    }
    this.recalcVolume();
    Store.save();
    return { isNewPb: set.isNewPb };
  },

  recalcVolume() {
    const session = this.getActive();
    if (!session) return;
    let vol = 0;
    session.exercises.forEach(ex => {
      ex.sets.forEach(s => {
        if (s.completed) {
          vol += (parseFloat(s.kg)||0) * (parseInt(s.reps)||0);
        }
      });
    });
    session.totalVolume = vol;
  },

  finishSession(calories) {
    const session = this.getActive();
    if (!session) return null;
    session.duration = Math.floor((Date.now() - session.startTime) / 1000);
    session.date = new Date(session.startTime).toISOString();
    session.calories = calories || 0;
    this.recalcVolume();
    // Clean up incomplete sets
    session.exercises.forEach(ex => {
      ex.sets = ex.sets.filter(s => s.completed);
    });
    session.exercises = session.exercises.filter(ex => ex.sets.length > 0);
    Store.data.sessions.unshift(session);
    Store.data.activeSession = null;
    if (this.timerInterval) clearInterval(this.timerInterval);
    Store.save();
    return session;
  },

  cancelSession() {
    Store.data.activeSession = null;
    if (this.timerInterval) clearInterval(this.timerInterval);
    Store.save();
  },

  getElapsed() {
    const session = this.getActive();
    if (!session) return 0;
    return Math.floor((Date.now() - session.startTime) / 1000);
  }
};

const U = {
  formatDuration(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },
  formatVolume(kg) {
    if (kg >= 1000) return (kg/1000).toFixed(1).replace(/\.0$/,'') + 'k';
    return kg.toLocaleString();
  },
  timeAgo(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    if (diff < 7) return diff + ' days ago';
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  },
  formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'2-digit' });
  },
  generateId(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') + '-' + Date.now().toString(36);
  },
  getCompletedSets(session) {
    let count = 0;
    session.exercises.forEach(ex => { ex.sets.forEach(s => { if (s.completed) count++; }); });
    return count;
  },
  getTotalSets(session) {
    let count = 0;
    session.exercises.forEach(ex => { count += ex.sets.length; });
    return count;
  },
  getWeekSessions() {
    const now = new Date();
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - now.getDay() + 1);
    weekStart.setHours(0,0,0,0);
    return Store.data.sessions.filter(s => new Date(s.date) >= weekStart);
  },
  getStreak() {
    const sessions = Store.data.sessions;
    if (!sessions.length) return 0;
    let streak = 0;
    const today = new Date();
    today.setHours(0,0,0,0);
    let checkDate = new Date(today);
    // Check if trained today
    const trainedToday = sessions.some(s => {
      const sd = new Date(s.date); sd.setHours(0,0,0,0);
      return sd.getTime() === today.getTime();
    });
    if (!trainedToday) checkDate.setDate(checkDate.getDate() - 1);
    for (let i = 0; i < 365; i++) {
      const found = sessions.some(s => {
        const sd = new Date(s.date); sd.setHours(0,0,0,0);
        return sd.getTime() === checkDate.getTime();
      });
      if (found) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
      else break;
    }
    return streak;
  },
  getMonthPBs() {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    let count = 0;
    Store.data.exercises.forEach(ex => {
      ex.pbHistory.forEach(pb => {
        if (new Date(pb.date) >= monthStart) count++;
      });
    });
    return count;
  },
  getWeekVolume() {
    return this.getWeekSessions().reduce((sum, s) => sum + (s.totalVolume || 0), 0);
  },
  getWeekCalories() {
    return this.getWeekSessions().reduce((sum, s) => sum + (s.calories || 0), 0);
  },
  getTotalCalories() {
    return Store.data.sessions.reduce((sum, s) => sum + (s.calories || 0), 0);
  },
  getLast7DaysVolume() {
    const days = [];
    const labels = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      d.setHours(0,0,0,0);
      const nextD = new Date(d);
      nextD.setDate(nextD.getDate() + 1);
      const dayVol = Store.data.sessions.filter(s => {
        const sd = new Date(s.date);
        return sd >= d && sd < nextD;
      }).reduce((sum, s) => sum + (s.totalVolume || 0), 0);
      days.push(dayVol);
      labels.push(d.toLocaleDateString('en-GB', {weekday:'short'}));
    }
    return { labels, data: days };
  }
};

        const day = Store.getWorkoutDay(s.workoutDayId);

        distribution[name] = (distribution[name] || 0) + 1;
        if (!distribution['_color_'+name]) distribution['_color_'+name] = colorMap[day?.color] || '#9cff93';
      });
      const labels = Object.keys(distribution).filter(k => !k.startsWith('_color_'));
      const data = labels.map(l => distribution[l]);
      const colors = labels.map(l => distribution['_color_'+l]);
      new Chart(distEl, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{ data, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          cutout: '65%',
          plugins: { legend: { display: false } }
        }
      });
    }
  },

  bindEvents() {
    // Event delegation handled globally
  }
};

  // ---- ACTIVE WORKOUT ----
  activeWorkout(dayId) {
    const day = Store.getWorkoutDay(dayId);
    if (!day) return '<p class="text-center text-zinc-500 py-20">Workout day not found</p>';

    let session = SessionManager.getActive();
    if (!session || session.workoutDayId !== dayId) {
      if (session) SessionManager.cancelSession();
      SessionManager.startSession(dayId);
      session = SessionManager.getActive();
    }

    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = day.name.toUpperCase();
    topTitle.className = 'text-lg font-bold tracking-tight text-white font-headline';

    const topRight = document.getElementById('topRight');
    topRight.innerHTML = `<span id="timerDisplay" class="text-lg font-headline font-bold text-secondary tabular-nums">${U.formatDuration(SessionManager.getElapsed())}</span>`;

    // Start timer
    if (SessionManager.timerInterval) clearInterval(SessionManager.timerInterval);
    SessionManager.timerInterval = setInterval(() => {
      const el = document.getElementById('timerDisplay');
      if (el) el.textContent = U.formatDuration(SessionManager.getElapsed());
    }, 1000);

    const completedSets = U.getCompletedSets(session);
    const totalSets = U.getTotalSets(session);

    return `
      <!-- Summary Bar -->
      <section class="grid grid-cols-3 gap-2 mb-6">
        <div class="bg-surface-container-low p-3 rounded-xl text-center">
          <span class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold block">Volume</span>
          <span id="liveVolume" class="text-lg font-headline font-bold">${U.formatVolume(session.totalVolume)}<span class="text-[10px] text-zinc-500 ml-0.5">kg</span></span>
        </div>
        <div class="bg-surface-container-low p-3 rounded-xl text-center">
          <span class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold block">Sets</span>
          <span id="liveSets" class="text-lg font-headline font-bold">${completedSets}<span class="text-[10px] text-zinc-500">/${totalSets}</span></span>
        </div>
        <div class="bg-surface-container-low p-3 rounded-xl text-center border ${session.pbsAchieved > 0 ? 'border-primary/20' : 'border-transparent'}">
          <span class="text-[9px] uppercase tracking-widest ${session.pbsAchieved > 0 ? 'text-primary' : 'text-zinc-500'} font-bold block">PBs</span>
          <span id="livePBs" class="text-lg font-headline font-bold ${session.pbsAchieved > 0 ? 'text-primary' : ''}">${session.pbsAchieved}</span>
        </div>
      </section>

      <!-- Exercise Cards -->
      <section id="exerciseList" class="space-y-5">
        ${session.exercises.map((sessionEx, exIdx) => {
          const ex = Store.getExercise(sessionEx.exerciseId);
          if (!ex) return '';
          const exType = ex.type || 'strength';
          const pbText = ex.pb ? this._formatPBText(ex) : 'No PB';
          // Determine input labels based on exercise type
          let label1 = 'KG', label2 = 'REPS', input1Mode = 'decimal', input1Step = '0.5';
          if (exType === 'cardio') {
            label1 = ex.inputLabels?.field1 || 'MINS';
            label2 = ex.inputLabels?.field2 || 'KM';
            input1Mode = 'numeric'; input1Step = '1';
          } else if (exType === 'bodyweight') {
            label1 = ''; label2 = 'REPS';
            input1Mode = 'numeric'; input1Step = '1';
          }
          const hideField1 = exType === 'bodyweight';
          const hideField2 = exType === 'cardio' && !ex.inputLabels?.field2;
          return `
            <div id="ex-${sessionEx.exerciseId}" class="bg-surface-container-low rounded-xl overflow-hidden shadow-xl ${sessionEx.newPb ? 'ring-1 ring-primary/40 pb-glow' : ''}">
              <div class="p-4 space-y-3">
                <div class="flex justify-between items-start gap-2">
                  <div class="min-w-0">
                    <h3 class="text-base font-headline font-bold text-on-surface leading-tight truncate">${ex.name}</h3>
                    <div class="flex flex-wrap gap-1.5 mt-1">
                      ${ex.muscleGroups.map(mg => {
                        const tagColor = mg === 'Cardio' ? 'error' : 'secondary';
                        return `<span class="bg-${tagColor}/10 text-${tagColor} text-[9px] px-2 py-0.5 rounded-full font-bold tracking-wider uppercase">${mg}</span>`;
                      }).join('')}
                    </div>
                  </div>
                  <div class="bg-surface-container-highest rounded-lg px-2.5 py-1 text-center shrink-0">
                    <span class="block text-[7px] uppercase text-zinc-500 font-bold tracking-tighter">PB</span>
                    <span class="text-primary font-headline font-bold text-xs tracking-tight">${pbText}</span>
                  </div>
                </div>

                ${sessionEx.newPb ? '<div class="inline-block bg-primary text-black text-[9px] font-black px-2 py-0.5 rounded-sm tracking-tighter uppercase italic shadow-[0_0_10px_rgba(156,255,147,0.5)] pb-badge-animate">NEW PB</div>' : ''}

                <div class="space-y-2">
                  ${sessionEx.sets.map((set, sIdx) => {
                    if (hideField1) {
                      // Bodyweight: just reps input, wider
                      return `
                        <div class="grid grid-cols-12 gap-2 items-center" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}">
                          <div class="col-span-1 text-zinc-500 font-headline font-bold text-xs text-center">${sIdx+1}</div>
                          <div class="col-span-9">
                            <div class="bg-surface-container-highest rounded-lg p-2 flex items-center ${set.completed ? 'opacity-60' : ''}">
                              <input class="bg-transparent border-none p-0 w-full text-center font-headline font-bold focus:ring-0 text-on-surface text-sm" type="number" inputmode="numeric" step="1" placeholder="--" value="${set.reps}" data-action="set-reps" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}" ${set.completed ? 'readonly' : ''}/>
                              <span class="text-[8px] text-zinc-500 font-bold pr-0.5 shrink-0">REPS</span>
                            </div>
                          </div>
                          <div class="col-span-2 flex justify-end">
                            ${set.completed ? `
                              <button class="w-8 h-8 rounded-full ${set.isNewPb ? 'bg-primary shadow-lg shadow-primary/30' : 'bg-primary'} flex items-center justify-center text-on-primary active:scale-90 transition-transform" data-action="toggle-set" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}">
                                <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">check</span>
                              </button>
                            ` : `
                              <button class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center text-zinc-500 border border-outline-variant/10 active:scale-90 transition-transform" data-action="toggle-set" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}">
                                <span class="material-symbols-outlined text-base">check</span>
                              </button>
                            `}
                          </div>
                        </div>`;
                    }
                    if (hideField2) {
                      // Cardio with single field (e.g. Plank - just secs)
                      return `
                        <div class="grid grid-cols-12 gap-2 items-center" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}">
                          <div class="col-span-1 text-zinc-500 font-headline font-bold text-xs text-center">${sIdx+1}</div>
                          <div class="col-span-9">
                            <div class="bg-surface-container-highest rounded-lg p-2 flex items-center ${set.completed ? 'opacity-60' : ''}">
                              <input class="bg-transparent border-none p-0 w-full text-center font-headline font-bold focus:ring-0 text-on-surface text-sm" type="number" inputmode="numeric" step="1" placeholder="--" value="${set.kg}" data-action="set-kg" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}" ${set.completed ? 'readonly' : ''}/>
                              <span class="text-[8px] text-zinc-500 font-bold pr-0.5 shrink-0">${label1}</span>
                            </div>
                          </div>
                          <div class="col-span-2 flex justify-end">
                            ${set.completed ? `
                              <button class="w-8 h-8 rounded-full ${set.isNewPb ? 'bg-primary shadow-lg shadow-primary/30' : 'bg-primary'} flex items-center justify-center text-on-primary active:scale-90 transition-transform" data-action="toggle-set" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}">
                                <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">check</span>
                              </button>
                            ` : `
                              <button class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center text-zinc-500 border border-outline-variant/10 active:scale-90 transition-transform" data-action="toggle-set" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}">
                                <span class="material-symbols-outlined text-base">check</span>
                              </button>
                            `}
                          </div>
                        </div>`;
                    }
                    // Standard 2-field layout (strength: KG/REPS, cardio: MINS/KM)
                    return `
                      <div class="grid grid-cols-12 gap-2 items-center" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}">
                        <div class="col-span-1 text-zinc-500 font-headline font-bold text-xs text-center">${sIdx+1}</div>
                        <div class="col-span-4">
                          <div class="bg-surface-container-highest rounded-lg p-2 flex items-center ${set.completed ? 'opacity-60' : ''}">
                            <input class="bg-transparent border-none p-0 w-full text-center font-headline font-bold focus:ring-0 text-on-surface text-sm" type="number" inputmode="${input1Mode}" step="${input1Step}" placeholder="--" value="${set.kg}" data-action="set-kg" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}" ${set.completed ? 'readonly' : ''}/>
                            <span class="text-[8px] text-zinc-500 font-bold pr-0.5 shrink-0">${label1}</span>
                          </div>
                        </div>
                        <div class="col-span-1 flex justify-center text-zinc-600">
                          <span class="material-symbols-outlined text-xs">close</span>
                        </div>
                        <div class="col-span-4">
                          <div class="bg-surface-container-highest rounded-lg p-2 flex items-center ${set.completed ? 'opacity-60' : ''}">
                            <input class="bg-transparent border-none p-0 w-full text-center font-headline font-bold focus:ring-0 text-on-surface text-sm" type="number" inputmode="numeric" step="1" placeholder="--" value="${set.reps}" data-action="set-reps" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}" ${set.completed ? 'readonly' : ''}/>
                            <span class="text-[8px] text-zinc-500 font-bold pr-0.5 shrink-0">${label2}</span>
                          </div>
                        </div>
                        <div class="col-span-2 flex justify-end">
                          ${set.completed ? `
                            <button class="w-8 h-8 rounded-full ${set.isNewPb ? 'bg-primary shadow-lg shadow-primary/30' : 'bg-primary'} flex items-center justify-center text-on-primary active:scale-90 transition-transform" data-action="toggle-set" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}">
                              <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">check</span>
                            </button>
                          ` : `
                            <button class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center text-zinc-500 border border-outline-variant/10 active:scale-90 transition-transform" data-action="toggle-set" data-exercise="${sessionEx.exerciseId}" data-set="${sIdx}">
                              <span class="material-symbols-outlined text-base">check</span>
                            </button>
                          `}
                        </div>
                      </div>`;
                  }).join('')}
                  <button class="w-full py-2 rounded-lg border border-dashed border-outline-variant/20 text-zinc-500 text-[10px] font-bold uppercase tracking-widest active:border-primary/50 active:text-primary transition-all" data-action="add-set" data-exercise="${sessionEx.exerciseId}">
                    Add Set
                  </button>
                </div>
              </div>
              <div class="h-16 relative overflow-hidden">
                <img class="w-full h-full object-cover opacity-20 grayscale" src="${IMG.getForExercise(ex)}" alt=""/>
                <div class="absolute inset-0 bg-gradient-to-t from-surface-container-low to-transparent"></div>
              </div>
            </div>`;
        }).join('')}
      </section>

      <!-- Actions -->
      <div class="pt-6 pb-4 flex flex-col gap-3">
        <button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-surface-container-lowest font-headline font-black uppercase tracking-[0.15em] rounded-full shadow-[0_0_30px_rgba(156,255,147,0.2)] active:scale-[0.98] transition-all text-sm" data-action="finish-workout">
          Finish Workout
        </button>
        <button class="w-full py-3 text-error/70 font-headline font-bold uppercase tracking-widest text-xs active:text-error transition-colors" data-action="cancel-workout">
          Cancel Session
        </button>
      </div>
    `;
  },

  // ---- SESSION DETAIL ----
  sessionDetail(sessionId) {
    const session = Store.getSession(sessionId);
    if (!session) return '<p class="text-center text-zinc-500 py-20">Session not found</p>';
    const day = Store.getWorkoutDay(session.workoutDayId);

    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'SESSION DETAIL';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    return `
      <section class="mb-8">
        <div class="flex flex-col gap-1 mb-6">
          <span class="text-primary font-headline font-bold tracking-[0.2em] text-[10px] uppercase">${U.formatDate(session.date)}</span>
          <h1 class="text-4xl font-headline font-black tracking-tighter text-white leading-none">${(day?.name || 'WORKOUT').toUpperCase()}</h1>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2 glass p-5 rounded-xl border border-outline-variant/10">
            <span class="text-zinc-400 font-label text-xs uppercase tracking-widest mb-1 block">Total Volume</span>
            <div class="flex items-baseline gap-2">
              <span class="text-4xl font-headline font-black text-primary">${session.totalVolume.toLocaleString()}</span>
              <span class="text-lg font-headline font-bold text-zinc-500">KG</span>
            </div>
          </div>
          <div class="glass p-4 rounded-xl border border-outline-variant/10">
            <span class="text-zinc-400 font-label text-xs uppercase tracking-widest mb-1 block">Duration</span>
            <span class="text-2xl font-headline font-bold text-white">${Math.floor((session.duration||0)/60)}<span class="text-secondary">m</span></span>
          </div>
          <div class="glass p-4 rounded-xl border border-outline-variant/10">
            <span class="text-zinc-400 font-label text-xs uppercase tracking-widest mb-1 block">PBs</span>
            <span class="text-2xl font-headline font-bold ${session.pbsAchieved > 0 ? 'text-primary' : 'text-white'}">${session.pbsAchieved}</span>
          </div>
          ${session.calories ? '<div class="glass p-4 rounded-xl border border-outline-variant/10 col-span-2"><span class="text-zinc-400 font-label text-xs uppercase tracking-widest mb-1 block">Calories Burned</span><span class="text-2xl font-headline font-bold text-error">' + session.calories + '<span class="text-sm text-zinc-500 ml-1">kcal</span></span></div>' : ''}
        </div>
      </section>

      <section class="space-y-4">
        <h2 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase">Exercise Breakdown</h2>
        ${session.exercises.map(sessionEx => {
          const ex = Store.getExercise(sessionEx.exerciseId);
          if (!ex) return '';
          return `
            <div class="${sessionEx.newPb ? 'border-l-2 border-primary' : ''} bg-surface-container-low p-4 rounded-xl space-y-3">
              <div class="flex justify-between items-start">
                <div>
                  ${sessionEx.newPb ? '<span class="bg-primary text-black text-[8px] font-black px-1.5 py-0.5 rounded-sm tracking-tighter uppercase italic shadow-[0_0_10px_rgba(156,255,147,0.5)] inline-block mb-1">NEW PB</span>' : ''}
                  <h3 class="text-base font-headline font-bold text-white">${ex.name}</h3>
                </div>
              </div>
              <div class="space-y-1.5">
                ${sessionEx.sets.map((set, i) => {
                  const exType = ex.type || 'strength';
                  let setText = '';
                  if (exType === 'cardio') {
                    const l1 = ex.inputLabels?.field1?.toLowerCase() || 'mins';
                    const l2 = ex.inputLabels?.field2?.toLowerCase() || '';
                    setText = l2 ? `${set.kg}${l1} / ${set.reps}${l2}` : `${set.kg}${l1}`;
                  } else if (exType === 'bodyweight') {
                    setText = `${set.reps} reps`;
                  } else {
                    setText = `${set.kg > 0 ? set.kg + 'kg' : ''} ${set.kg > 0 ? 'x' : ''} ${set.reps} reps`;
                  }
                  return `
                  <div class="flex items-center gap-3 ${set.isNewPb ? 'bg-primary/5 rounded-lg px-2 py-1 border border-primary/10' : ''}">
                    <span class="text-zinc-500 text-xs font-bold w-5">S${i+1}</span>
                    <span class="font-headline font-bold text-sm">${setText}</span>
                    ${set.isNewPb ? '<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings:\'FILL\' 1">stars</span>' : ''}
                  </div>`;
                }).join('')}
              </div>
            </div>`;
        }).join('')}
      </section>
    `;
  },

  // ---- HISTORY ----
  history() {
    const topTitle = document.getElementById('topTitle');

      return '<div class="text-center py-20"><span class="material-symbols-outlined text-5xl text-zinc-700">history</span><p class="text-zinc-500 font-headline font-bold mt-3">No sessions yet</p></div>';

              <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-xl bg-surface-container-highest flex items-center justify-center">

                </div>
                <div>
                  <h4 class="font-headline font-bold text-sm">${day?.name || 'Workout'}</h4>

  // ---- LIBRARY (Session Journal) ----
  library() {
    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'LIBRARY';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const sessions = Store.data.sessions;

    // Tab: sessions vs exercises
    return `
      <section class="space-y-4">
        <!-- Tab switcher -->
        <div class="flex gap-2 mb-2">
          <button class="lib-tab flex-1 py-2.5 rounded-xl font-headline font-bold text-sm uppercase tracking-widest bg-primary/20 text-primary border border-primary/30" data-lib-tab="sessions">Sessions</button>
          <button class="lib-tab flex-1 py-2.5 rounded-xl font-headline font-bold text-sm uppercase tracking-widest bg-surface-container-low text-zinc-400 border border-outline-variant/10" data-lib-tab="exercises">Exercises</button>
        </div>

        <div id="libContent">
          ${this._renderSessionJournal(sessions)}
        </div>
      </section>
    `;
  },

  _renderSessionJournal(sessions) {
    if (!sessions.length) {
      return '<div class="text-center py-16"><span class="material-symbols-outlined text-5xl text-zinc-700">calendar_month</span><p class="text-zinc-500 font-headline font-bold mt-3">No sessions yet</p><p class="text-zinc-600 text-sm mt-1">Complete a workout to see it here</p></div>';
    }

    return '<div class="space-y-3">' + sessions.map(s => {
      const day = Store.getWorkoutDay(s.workoutDayId);
      const d = new Date(s.date);
      const dateStr = d.toLocaleDateString('en-GB', {weekday:'short'}) + ' ' + d.getDate() + '.' + (d.getMonth()+1) + '.' + String(d.getFullYear()).slice(2);
      const img = IMG[day?.id === 'cardio-abs' ? 'cardio' : day?.id === 'shoulders-triceps' ? 'shoulders' : day?.id] || IMG.gym;
      const exCount = s.exercises ? s.exercises.length : 0;
      const colorMap = {primary:'border-primary/30',secondary:'border-secondary/30',tertiary:'border-tertiary/30',error:'border-error/30'};
      const borderClass = colorMap[day?.color] || 'border-primary/30';

      return '<a href="#/library/session/' + s.id + '" class="glass rounded-2xl overflow-hidden block active:scale-[0.98] transition-all group border ' + borderClass + '">' +
        '<div class="flex gap-3 p-3">' +
          '<div class="w-20 h-20 rounded-xl overflow-hidden shrink-0">' +
            '<img class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" src="' + img + '" alt=""/>' +
          '</div>' +
          '<div class="flex flex-col justify-between py-0.5 min-w-0 flex-1">' +
            '<div>' +
              '<span class="font-label text-[9px] font-extrabold uppercase tracking-[0.15em] text-' + (day?.color || 'primary') + '">' + dateStr + '</span>' +
              '<h4 class="font-headline font-bold text-base truncate group-hover:text-primary transition-colors">' + (day?.name || 'Workout') + '</h4>' +
            '</div>' +
            '<div class="flex gap-4 items-center">' +
              '<div class="flex flex-col"><span class="text-[8px] uppercase font-bold text-zinc-500 tracking-widest">Volume</span><span class="text-xs font-bold">' + U.formatVolume(s.totalVolume) + ' kg</span></div>' +
              '<div class="flex flex-col"><span class="text-[8px] uppercase font-bold text-zinc-500 tracking-widest">Exercises</span><span class="text-xs font-bold">' + exCount + '</span></div>' +
              (s.pbsAchieved > 0 ? '<span class="bg-primary text-black text-[8px] font-black px-1.5 py-0.5 rounded-sm tracking-tighter uppercase italic">' + s.pbsAchieved + ' PB</span>' : '') +
              (s.calories ? '<div class="flex flex-col"><span class="text-[8px] uppercase font-bold text-zinc-500 tracking-widest">Kcal</span><span class="text-xs font-bold text-error">' + s.calories + '</span></div>' : '') +

        '</div>' +
      '</a>';

  _renderExerciseBrowse() {
    const categories = [...new Set(Store.data.exercises.map(e => e.category))];
    return '<div class="space-y-4">' +
      '<div class="relative"><span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 text-lg">search</span><input id="librarySearch" type="text" placeholder="Search exercises..." class="w-full bg-surface-container-low border border-outline-variant/10 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-1 focus:ring-primary/40 focus:border-primary/40 placeholder:text-zinc-600"/></div>' +
      '<div id="filterPills" class="flex gap-2 overflow-x-auto no-scrollbar pb-1"><button class="filter-pill bg-primary/20 text-primary px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase shrink-0 border border-primary/30" data-filter="all">All</button>' +
      categories.map(c => '<button class="filter-pill bg-surface-container-low text-zinc-400 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase shrink-0 border border-outline-variant/10" data-filter="' + c + '">' + c + '</button>').join('') +
      '</div><div id="exerciseList" class="space-y-2">' + this._renderExerciseList(Store.data.exercises) + '</div></div>';
  },

  // Session detail with charts (for library view)
  librarySessionDetail(sessionId) {
    const session = Store.getSession(sessionId);
    if (!session) return '<p class="text-center text-zinc-500 py-20">Session not found</p>';
    const day = Store.getWorkoutDay(session.workoutDayId);

    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'SESSION';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const d = new Date(session.date);
    const dateStr = d.toLocaleDateString('en-GB', {weekday:'long'}) + ' ' + d.getDate() + '.' + (d.getMonth()+1) + '.' + String(d.getFullYear()).slice(2);
    const img = IMG[day?.id === 'cardio-abs' ? 'cardio' : day?.id === 'shoulders-triceps' ? 'shoulders' : day?.id] || IMG.gym;

    // Build exercise volume data for chart
    const exLabels = [];
    const exVolumes = [];
    session.exercises.forEach(se => {
      const ex = Store.getExercise(se.exerciseId);
      if (!ex) return;
      exLabels.push(ex.name.length > 12 ? ex.name.slice(0,12) + '..' : ex.name);
      let vol = 0;
      se.sets.forEach(s => { vol += (parseFloat(s.kg)||0) * (parseInt(s.reps)||0); });
      exVolumes.push(vol);
    });

    return `
      <!-- Hero -->
      <div class="relative rounded-2xl overflow-hidden h-40 mb-6">
        <img class="w-full h-full object-cover" src="${img}" alt=""/>
        <div class="absolute inset-0 bg-gradient-to-t from-background via-background/60 to-transparent"></div>
        <div class="absolute bottom-4 left-5 right-5">
          <span class="text-primary font-headline font-bold tracking-[0.15em] text-[10px] uppercase">${dateStr}</span>
          <h1 class="text-3xl font-headline font-black tracking-tighter text-white leading-none">${(day?.name || 'WORKOUT').toUpperCase()}</h1>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-2 mb-6">
        <div class="glass p-3 rounded-xl border border-outline-variant/10 text-center">
          <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold block">Volume</span>
          <span class="text-lg font-headline font-black text-primary">${U.formatVolume(session.totalVolume)}<span class="text-[10px] text-zinc-500 ml-0.5">kg</span></span>
        </div>
        <div class="glass p-3 rounded-xl border border-outline-variant/10 text-center">
          <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold block">Duration</span>
          <span class="text-lg font-headline font-black">${Math.floor((session.duration||0)/60)}<span class="text-secondary text-sm">m</span></span>
        </div>
        <div class="glass p-3 rounded-xl border border-outline-variant/10 text-center">
          <span class="text-[9px] ${session.pbsAchieved > 0 ? 'text-primary' : 'text-zinc-500'} uppercase tracking-widest font-bold block">PBs</span>
          <span class="text-lg font-headline font-black ${session.pbsAchieved > 0 ? 'text-primary' : ''}">${session.pbsAchieved}</span>
        </div>
      </div>
      ${session.calories ? '<div class="glass p-3 rounded-xl border border-outline-variant/10 text-center mb-6"><span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold block">Calories</span><span class="text-lg font-headline font-black text-error">' + session.calories + '<span class="text-[10px] text-zinc-500 ml-0.5">kcal</span></span></div>' : ''}

      <!-- Volume per exercise chart -->
      ${exLabels.length > 0 ? '<div class="glass rounded-2xl p-4 border border-outline-variant/10 mb-6"><h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Volume per Exercise</h3><div style="height:' + Math.max(140, exLabels.length * 28) + 'px"><canvas id="sessionExChart"></canvas></div></div>' : ''}

      <!-- Exercise Breakdown -->
      <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Exercise Breakdown</h3>
      <div class="space-y-3">
        ${session.exercises.map(sessionEx => {
          const ex = Store.getExercise(sessionEx.exerciseId);
          if (!ex) return '';
          const exImg = IMG.getForExercise(ex);
          const exType = ex.type || 'strength';
          return `
            <div class="${sessionEx.newPb ? 'ring-1 ring-primary/30' : ''} bg-surface-container-low rounded-xl overflow-hidden">
              <div class="p-4 space-y-2">
                <div class="flex items-start gap-3">
                  <div class="w-12 h-12 rounded-lg overflow-hidden shrink-0">
                    <img class="w-full h-full object-cover" src="${exImg}" alt=""/>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                      ${sessionEx.newPb ? '<span class="bg-primary text-black text-[7px] font-black px-1.5 py-0.5 rounded-sm tracking-tighter uppercase italic shadow-[0_0_10px_rgba(156,255,147,0.5)]">NEW PB</span>' : ''}
                      <h4 class="font-headline font-bold text-sm truncate">${ex.name}</h4>
                    </div>
                    <div class="flex flex-wrap gap-1 mt-0.5">
                      ${ex.muscleGroups.slice(0,2).map(mg => '<span class="text-[8px] text-zinc-500 uppercase tracking-wider">' + mg + '</span>').join('<span class="text-zinc-700">&middot;</span>')}
                    </div>
                  </div>
                  <div class="bg-surface-container-highest rounded-lg px-2 py-1 text-center shrink-0">
                    <span class="block text-[7px] uppercase text-zinc-500 font-bold">PB</span>
                    <span class="text-primary font-headline font-bold text-[10px]">${ex.pb ? Views._formatPBText(ex) : '--'}</span>
                  </div>
                </div>
                <div class="space-y-1">
                  ${sessionEx.sets.map((set, i) => {
                    let setText = '';
                    if (exType === 'cardio') {
                      const l1 = ex.inputLabels?.field1?.toLowerCase() || 'mins';
                      const l2 = ex.inputLabels?.field2?.toLowerCase() || '';
                      setText = l2 ? set.kg + l1 + ' / ' + set.reps + l2 : set.kg + l1;
                    } else if (exType === 'bodyweight') {
                      setText = set.reps + ' reps';
                    } else {
                      setText = (set.kg > 0 ? set.kg + 'kg x ' : '') + set.reps + ' reps';
                    }
                    return '<div class="flex items-center gap-2 ' + (set.isNewPb ? 'bg-primary/5 rounded px-2 py-0.5 border border-primary/10' : '') + '"><span class="text-zinc-600 text-[10px] font-bold w-4">S' + (i+1) + '</span><span class="font-headline font-bold text-xs">' + setText + '</span>' + (set.isNewPb ? '<span class="material-symbols-outlined text-primary text-xs" style="font-variation-settings:\'FILL\' 1">stars</span>' : '') + '</div>';
                  }).join('')}
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>

      <!-- Footer -->
      <div class="rounded-2xl overflow-hidden h-24 relative mt-6">
        <img class="w-full h-full object-cover opacity-40" src="${IMG.gymFooter}" alt=""/>
        <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
        <div class="absolute bottom-3 left-4">
          <p class="text-primary font-headline font-black italic text-lg tracking-tighter">KEEP PUSHING</p>
        </div>
      </div>
    `;
  },

  _renderPBHero(ex) {
    const exType = ex.type || 'strength';
    let pbDisplay = '';
    if (exType === 'cardio') {
      const l1 = ex.inputLabels?.field1?.toLowerCase() || 'mins';
      const l2 = ex.inputLabels?.field2?.toLowerCase() || '';
      pbDisplay = l2
        ? '<span class="text-5xl font-headline font-black text-white">' + ex.pb.kg + '</span><span class="text-xl font-headline text-zinc-400">' + l1 + '</span><span class="text-2xl text-zinc-600 mx-1">/</span><span class="text-5xl font-headline font-black text-white">' + ex.pb.reps + '</span><span class="text-xl font-headline text-zinc-400">' + l2 + '</span>'
        : '<span class="text-5xl font-headline font-black text-white">' + ex.pb.kg + '</span><span class="text-xl font-headline text-zinc-400">' + l1 + '</span>';
    } else if (exType === 'bodyweight') {
      pbDisplay = '<span class="text-5xl font-headline font-black text-white">' + ex.pb.reps + '</span><span class="text-xl font-headline text-zinc-400">reps</span>';
    } else {
      pbDisplay = (ex.pb.kg > 0 ? '<span class="text-5xl font-headline font-black text-white">' + ex.pb.kg + '</span><span class="text-xl font-headline text-zinc-400">kg</span><span class="text-2xl text-zinc-600 mx-1">x</span>' : '') + '<span class="text-5xl font-headline font-black text-white">' + ex.pb.reps + '</span><span class="text-xl font-headline text-zinc-400">reps</span>';
    }
    return '<div class="bg-gradient-to-br from-primary/10 to-primary/5 p-6 rounded-2xl border border-primary/20 text-center"><span class="text-[10px] text-primary uppercase tracking-widest font-bold block mb-2">Current Personal Best</span><div class="flex items-baseline justify-center gap-2">' + pbDisplay + '</div><p class="text-xs text-zinc-500 mt-2">' + U.formatDate(ex.pb.date) + '</p></div>';
  },

  _formatPBText(ex) {
    if (!ex.pb) return 'No PB';
    const exType = ex.type || 'strength';
    if (exType === 'cardio') {
      const l1 = ex.inputLabels?.field1?.toLowerCase() || 'mins';
      const l2 = ex.inputLabels?.field2?.toLowerCase() || '';
      if (!l2) return `${ex.pb.kg}${l1}`;
      return `${ex.pb.kg}${l1} / ${ex.pb.reps}${l2}`;
    }
    if (exType === 'bodyweight') {
      return `${ex.pb.reps} reps`;
    }
    return `${ex.pb.kg > 0 ? ex.pb.kg+'kg x ' : ''}${ex.pb.reps} reps`;
  },

  _renderExerciseList(exercises) {
    return exercises.map(ex => {
      const pbText = ex.pb ? this._formatPBText(ex) : 'No PB';
      const img = IMG.getForExercise(ex);
      return `
        <a href="#/library/${ex.id}" class="glass rounded-2xl overflow-hidden flex gap-3 p-3 active:bg-surface-container-high/60 transition-all block group">
          <div class="w-20 h-20 rounded-xl overflow-hidden bg-surface-container-lowest shrink-0">
            <img class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" src="${img}" alt="${ex.name}"/>
          </div>
          <div class="flex flex-col justify-between py-0.5 min-w-0 flex-1">
            <div>
              <span class="font-label text-[9px] font-extrabold uppercase tracking-[0.15em] text-secondary">${ex.muscleGroups[0] || ''}</span>
              <h4 class="font-headline font-bold text-sm truncate group-hover:text-primary transition-colors">${ex.name}</h4>
            </div>
            <div class="flex gap-4 items-center">
              <div class="flex flex-col">
                <span class="text-[8px] uppercase font-bold text-on-surface-variant tracking-widest">Record</span>
                <span class="text-xs font-bold ${ex.pb ? 'text-primary' : 'text-zinc-600'}">${pbText}</span>
              </div>
            </div>
          </div>
        </a>`;
    }).join('');
  },

  // ---- EXERCISE DETAIL ----
  exerciseDetail(exerciseId) {
    const ex = Store.getExercise(exerciseId);
    if (!ex) return '<p class="text-center text-zinc-500 py-20">Exercise not found</p>';

    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'EXERCISE';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const history = [...ex.pbHistory].reverse();

    return `
      <section class="space-y-6">
        <div class="text-center py-6">
          <h2 class="text-2xl font-headline font-bold tracking-tight">${ex.name}</h2>
          <div class="flex justify-center gap-2 mt-2">
            ${ex.muscleGroups.map(mg => `<span class="bg-secondary/10 text-secondary text-[10px] px-2.5 py-0.5 rounded-full font-bold tracking-wider uppercase">${mg}</span>`).join('')}
          </div>
        </div>

        ${ex.pb ? Views._renderPBHero(ex) : '<div class="bg-surface-container-low p-6 rounded-2xl text-center"><span class="text-zinc-500 font-headline font-bold">No PB recorded yet</span></div>'}

        ${history.length > 0 ? `
          <div>
            <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">PB History</h3>
            <div class="space-y-2">
              ${history.map((pb, i) => {
                const exType = ex.type || 'strength';
                let pbStr = '';
                if (exType === 'cardio') {
                  const l1 = ex.inputLabels?.field1?.toLowerCase() || 'mins';
                  const l2 = ex.inputLabels?.field2?.toLowerCase() || '';
                  pbStr = l2 ? `${pb.kg}${l1} / ${pb.reps}${l2}` : `${pb.kg}${l1}`;
                } else if (exType === 'bodyweight') {
                  pbStr = `${pb.reps} reps`;
                } else {
                  pbStr = `${pb.kg > 0 ? pb.kg+'kg x ' : ''}${pb.reps} reps`;
                }
                return `
                <div class="flex items-center justify-between bg-surface-container-low p-3 rounded-xl ${i === 0 ? 'border border-primary/10' : ''}">
                  <span class="text-xs text-zinc-500">${U.formatDate(pb.date)}</span>
                  <span class="font-headline font-bold text-sm ${i === 0 ? 'text-primary' : ''}">${pbStr}</span>
                </div>`;
              }).join('')}
            </div>
          </div>
        ` : ''}
      </section>
    `;
  },

  // ---- STATS ----
  stats() {
    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'STATS';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const sessions = Store.data.sessions;
    const totalVol = sessions.reduce((sum, s) => sum + (s.totalVolume || 0), 0);
    const totalPBs = Store.data.exercises.reduce((sum, ex) => sum + ex.pbHistory.length, 0);
    const totalCals = U.getTotalCalories();
    const avgDuration = sessions.length ? Math.round(sessions.reduce((sum, s) => sum + (s.duration || 0), 0) / sessions.length) : 0;

    // Workout distribution
    const distribution = {};
    const distColors = {};
    sessions.forEach(s => {
      const day = Store.getWorkoutDay(s.workoutDayId);
      const name = day?.name || 'Other';
      distribution[name] = (distribution[name] || 0) + 1;
      if (!distColors[name]) distColors[name] = day?.color || 'primary';
    });

    // Recent PBs
    const recentPBs = [];
    Store.data.exercises.forEach(ex => {
      ex.pbHistory.forEach(pb => {
        recentPBs.push({ name: ex.name, exerciseId: ex.id, ...pb });
      });
    });
    recentPBs.sort((a, b) => new Date(b.date) - new Date(a.date));

    return `
      <section class="space-y-6">
        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/5">
            <span class="material-symbols-outlined text-primary mb-2 text-xl">fitness_center</span>
            <p class="text-2xl font-headline font-black">${U.formatVolume(totalVol)}</p>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-0.5">Total Volume (kg)</p>
          </div>
          <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/5">
            <span class="material-symbols-outlined text-secondary mb-2 text-xl">calendar_month</span>
            <p class="text-2xl font-headline font-black">${sessions.length}</p>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-0.5">Total Sessions</p>
          </div>
          <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/5">
            <span class="material-symbols-outlined text-error mb-2 text-xl">local_fire_department</span>
            <p class="text-2xl font-headline font-black">${U.formatVolume(totalCals)}</p>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-0.5">Total Calories</p>
          </div>
          <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/5">
            <span class="material-symbols-outlined text-tertiary mb-2 text-xl">timer</span>
            <p class="text-2xl font-headline font-black">${Math.floor(avgDuration/60)}<span class="text-sm text-zinc-500">m</span></p>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-0.5">Avg Duration</p>
          </div>
        </div>

        <!-- Volume Trend Chart -->
        <div class="glass rounded-2xl p-5 border border-outline-variant/10">
          <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-4">7-Day Volume Trend</h3>
          <div style="height:180px"><canvas id="volumeChart"></canvas></div>
        </div>

        <!-- Workout Distribution Chart -->
        ${Object.keys(distribution).length > 0 ? `
          <div class="glass rounded-2xl p-5 border border-outline-variant/10">
            <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-4">Workout Distribution</h3>
            <div class="flex items-center gap-6">
              <div style="width:140px;height:140px" class="shrink-0"><canvas id="distChart"></canvas></div>
              <div class="space-y-2 flex-1">
                ${Object.entries(distribution).map(([name, count]) => {
                  const colorMap = {primary:'#9cff93',secondary:'#00e3fd',tertiary:'#a68cff',error:'#ff7351'};
                  const c = colorMap[distColors[name]] || '#9cff93';
                  return '<div class="flex items-center gap-2"><div class="w-2.5 h-2.5 rounded-full shrink-0" style="background:'+c+'"></div><span class="text-xs font-bold flex-1">'+name+'</span><span class="text-xs text-zinc-400">'+count+'</span></div>';
                }).join('')}
              </div>
            </div>
          </div>
        ` : ''}

        <!-- PBs -->
        <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/5 text-center">
          <span class="material-symbols-outlined text-primary mb-2 text-3xl">emoji_events</span>
          <p class="text-3xl font-headline font-black">${totalPBs}</p>
          <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-0.5">Total Personal Bests</p>
        </div>

        ${recentPBs.length > 0 ? `
          <div>
            <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Recent PBs</h3>
            <div class="space-y-2">
              ${recentPBs.slice(0, 8).map(pb => {
                const ex = Store.getExercise(pb.exerciseId);
                const pbStr = ex ? Views._formatPBText(ex) : (pb.kg > 0 ? pb.kg+'kg x ' : '') + pb.reps + ' reps';
                const img = ex ? IMG.getForExercise(ex) : IMG.custom;
                return '<a href="#/library/'+pb.exerciseId+'" class="flex items-center gap-3 bg-surface-container-low p-3 rounded-xl active:bg-surface-container-high transition-all block"><div class="w-10 h-10 rounded-lg overflow-hidden shrink-0"><img class="w-full h-full object-cover" src="'+img+'"/></div><div class="flex-1 min-w-0"><span class="font-headline font-bold text-sm truncate block">'+pb.name+'</span><span class="text-[10px] text-zinc-500">'+U.formatDate(pb.date)+'</span></div><span class="text-primary font-headline font-bold text-sm shrink-0">'+pbStr+'</span></a>';
              }).join('')}
            </div>
          </div>
        ` : ''}

        <!-- Data Management -->
        <div class="glass rounded-2xl p-5 border border-outline-variant/10">
          <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-1">Data Management</h3>
          <p class="text-[11px] text-zinc-500 mb-4">Back up your workout data or restore from a previous backup</p>
          <div class="flex gap-3">
            <button class="flex-1 py-3 bg-primary/10 text-primary rounded-xl font-headline font-bold text-xs uppercase tracking-widest active:bg-primary/20 transition-all flex items-center justify-center gap-2" data-action="export-data">
              <span class="material-symbols-outlined text-base">download</span>
              Export
            </button>
            <label class="flex-1 py-3 bg-surface-container-highest text-zinc-300 rounded-xl font-headline font-bold text-xs uppercase tracking-widest active:bg-surface-container-high transition-all flex items-center justify-center gap-2 cursor-pointer">
              <span class="material-symbols-outlined text-base">upload</span>
              Import
              <input type="file" accept=".json" class="hidden" id="importFileInput" data-action="import-file"/>
            </label>
          </div>
          <button class="w-full mt-3 py-2 text-error/50 text-[10px] font-headline font-bold uppercase tracking-widest active:text-error transition-colors" data-action="reset-data">
            Reset to Default Data
          </button>
        </div>

        <!-- Footer Image -->
        <div class="rounded-3xl overflow-hidden h-32 relative">
          <img class="w-full h-full object-cover opacity-50" src="${IMG.gymFooter}" alt=""/>
          <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
          <div class="absolute bottom-4 left-5">
            <p class="text-primary font-headline font-black italic text-xl tracking-tighter">EVOLVE FASTER</p>
          </div>
        </div>
      </section>
    `;
    // Charts are rendered after DOM insert via _renderCharts
  },

  // ---- EDIT WORKOUT DAY ----
  editDay(dayId) {
    const day = Store.getWorkoutDay(dayId);
    if (!day) return '<p class="text-center text-zinc-500 py-20">Day not found</p>';

    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'EDIT DAY';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const allExercises = Store.data.exercises;
    const dayExercises = day.exerciseIds.map(id => Store.getExercise(id)).filter(Boolean);
    const availableExercises = allExercises.filter(e => !day.exerciseIds.includes(e.id));

    return `
      <section class="space-y-6">
        <div>
          <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold block mb-2">Day Name</label>
          <input id="dayNameInput" type="text" value="${day.name}" class="w-full bg-surface-container-low border border-outline-variant/10 rounded-xl px-4 py-3 text-sm font-headline font-bold focus:ring-1 focus:ring-primary/40"/>
        </div>

        <div>
          <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Current Exercises (${dayExercises.length})</h3>
          <div id="currentExercises" class="space-y-2">
            ${dayExercises.map((ex, i) => `
              <div class="flex items-center justify-between bg-surface-container-low p-3 rounded-xl">
                <div class="flex items-center gap-3">
                  <span class="text-zinc-500 font-headline font-bold text-xs w-5">${i+1}</span>
                  <span class="font-headline font-bold text-sm">${ex.name}</span>
                </div>
                <button class="w-8 h-8 rounded-full bg-error/10 flex items-center justify-center text-error active:scale-90 transition-transform" data-action="remove-exercise-from-day" data-day="${dayId}" data-exercise="${ex.id}">
                  <span class="material-symbols-outlined text-base">remove</span>
                </button>
              </div>
            `).join('')}
          </div>
        </div>

        ${availableExercises.length > 0 ? `
          <div>
            <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Add Existing Exercise</h3>
            <div class="space-y-2">
              ${availableExercises.map(ex => `
                <div class="flex items-center justify-between bg-surface-container-low p-3 rounded-xl">
                  <span class="font-headline font-bold text-sm text-zinc-400">${ex.name}</span>
                  <button class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary active:scale-90 transition-transform" data-action="add-exercise-to-day" data-day="${dayId}" data-exercise="${ex.id}">
                    <span class="material-symbols-outlined text-base">add</span>
                  </button>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}

        <div class="border-t border-outline-variant/10 pt-4">
          <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Create New Exercise</h3>
          <div class="space-y-3">
            <input id="newExName" type="text" placeholder="Exercise name" class="w-full bg-surface-container-low border border-outline-variant/10 rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-primary/40 placeholder:text-zinc-600"/>
            <input id="newExMuscle" type="text" placeholder="Muscle group (e.g. Chest, Quads)" class="w-full bg-surface-container-low border border-outline-variant/10 rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-primary/40 placeholder:text-zinc-600"/>
            <button class="w-full py-3 bg-primary/10 text-primary rounded-xl font-headline font-bold text-sm uppercase tracking-widest active:bg-primary/20 transition-all" data-action="create-and-add-exercise" data-day="${dayId}">
              Create &amp; Add Exercise
            </button>
          </div>
        </div>

        <button class="w-full py-3 bg-gradient-to-r from-primary to-primary-container text-surface-container-lowest font-headline font-bold uppercase tracking-widest rounded-full active:scale-[0.98] transition-all text-sm" data-action="save-day-name" data-day="${dayId}">
          Save Changes
        </button>

        <button class="w-full py-3 text-error/70 font-headline font-bold uppercase tracking-widest text-xs active:text-error transition-colors" data-action="delete-day" data-day="${dayId}">
          Delete Workout Day
        </button>
      </section>
    `;
  },

  // ---- ADD NEW WORKOUT DAY ----
  addDay() {
    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'NEW DAY';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const icons = ['fitness_center','directions_run','sports_martial_arts','self_improvement','pool','hiking','rowing','sports_gymnastics'];
    const colors = ['primary','secondary','tertiary','error'];

    return `
      <section class="space-y-6">
        <div>
          <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold block mb-2">Day Name</label>
          <input id="newDayName" type="text" placeholder="e.g. Back & Biceps" class="w-full bg-surface-container-low border border-outline-variant/10 rounded-xl px-4 py-3 text-sm font-headline font-bold focus:ring-1 focus:ring-primary/40 placeholder:text-zinc-600"/>
        </div>

        <div>
          <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold block mb-2">Icon</label>
          <div class="flex flex-wrap gap-2" id="iconSelector">
            ${icons.map((icon, i) => `
              <button class="w-11 h-11 rounded-xl ${i===0?'bg-primary/20 text-primary border-primary/30':'bg-surface-container-low text-zinc-400 border-outline-variant/10'} border flex items-center justify-center active:scale-90 transition-all icon-option" data-icon="${icon}">
                <span class="material-symbols-outlined">${icon}</span>
              </button>
            `).join('')}
          </div>
        </div>

        <div>
          <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold block mb-2">Color</label>
          <div class="flex gap-2" id="colorSelector">
            ${colors.map((color, i) => `
              <button class="w-11 h-11 rounded-xl bg-${color}/20 border ${i===0?'border-'+color+'/50 ring-2 ring-'+color+'/30':'border-'+color+'/20'} flex items-center justify-center active:scale-90 transition-all color-option" data-color="${color}">
                <div class="w-4 h-4 rounded-full bg-${color}"></div>
              </button>
            `).join('')}
          </div>
        </div>

        <button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-surface-container-lowest font-headline font-black uppercase tracking-[0.15em] rounded-full active:scale-[0.98] transition-all text-sm" data-action="create-day">
          Create Workout Day
        </button>
      </section>
    `;
  }
};

// ============================================================
// GLOBAL EVENT DELEGATION
// ============================================================
document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'toggle-set') {
    const exerciseId = btn.dataset.exercise;
    const setIndex = parseInt(btn.dataset.set);
    const result = SessionManager.completeSet(exerciseId, setIndex);
    Router.resolve(); // re-render
    if (result.isNewPb) {
      setTimeout(() => {
        const el = document.getElementById('ex-' + exerciseId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
  }

  if (action === 'add-set') {
    SessionManager.addSet(btn.dataset.exercise);
    Router.resolve();
  }

  if (action === 'finish-workout') {
    const session = SessionManager.getActive();
    if (!session) return;
    const completedSets = U.getCompletedSets(session);
    if (completedSets === 0) {
      showModal('<h3 class="text-lg font-headline font-bold mb-3">No sets logged</h3><p class="text-sm text-zinc-400 mb-4">Complete at least one set before finishing.</p><button class="w-full py-3 bg-surface-container-highest rounded-xl font-headline font-bold text-sm" data-action="close-modal">OK</button>');
      return;
    }
    showModal('<h3 class="text-lg font-headline font-bold mb-2">Finish Workout</h3><p class="text-sm text-zinc-400 mb-4">Add calories burned (optional)</p><div class="bg-surface-container-highest rounded-xl p-3 flex items-center mb-5"><input id="caloriesInput" type="number" inputmode="numeric" placeholder="e.g. 450" class="bg-transparent border-none p-0 w-full text-center font-headline font-bold focus:ring-0 text-on-surface text-lg"/><span class="text-xs text-zinc-500 font-bold shrink-0">KCAL</span></div><div class="flex gap-3"><button class="flex-1 py-3 bg-surface-container-highest rounded-xl font-headline font-bold text-sm" data-action="close-modal">Cancel</button><button class="flex-1 py-3 bg-gradient-to-r from-primary to-primary-container text-surface-container-lowest rounded-xl font-headline font-bold text-sm" data-action="confirm-finish">Save</button></div>');
    setTimeout(() => document.getElementById('caloriesInput')?.focus(), 100);
  }

  if (action === 'confirm-finish') {
    const cal = parseInt(document.getElementById('caloriesInput')?.value) || 0;
    const session = SessionManager.finishSession(cal);
    closeModal();
    if (session) {
      location.hash = '#/history/' + session.id;
    }
  }

  if (action === 'cancel-workout') {
    showModal(`
      <h3 class="text-lg font-headline font-bold mb-3">Cancel Session?</h3>
      <p class="text-sm text-zinc-400 mb-6">All progress from this session will be lost.</p>
      <div class="flex gap-3">
        <button class="flex-1 py-3 bg-surface-container-highest rounded-xl font-headline font-bold text-sm" data-action="close-modal">Keep Going</button>
        <button class="flex-1 py-3 bg-error/20 text-error rounded-xl font-headline font-bold text-sm" data-action="confirm-cancel">Cancel It</button>
      </div>
    `);
  }

  if (action === 'export-data') {
    const blob = new Blob([JSON.stringify(Store.data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kinetic-lab-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  if (action === 'reset-data') {
    showModal('<h3 class="text-lg font-headline font-bold mb-3">Reset All Data?</h3><p class="text-sm text-zinc-400 mb-6">This will delete all your sessions and restore the original workout history. This cannot be undone.</p><div class="flex gap-3"><button class="flex-1 py-3 bg-surface-container-highest rounded-xl font-headline font-bold text-sm" data-action="close-modal">Cancel</button><button class="flex-1 py-3 bg-error/20 text-error rounded-xl font-headline font-bold text-sm" data-action="confirm-reset">Reset</button></div>');
  }

  if (action === 'confirm-reset') {
    localStorage.removeItem(STORAGE_KEY);
    Store.load();
    closeModal();
    location.hash = '#/dashboard';
    Router.resolve();
  }

  if (action === 'confirm-cancel') {
    SessionManager.cancelSession();
    closeModal();
    location.hash = '#/train';
  }

  if (action === 'close-modal') {
    closeModal();
  }

  if (action === 'close-modal-reload') {
    closeModal();
    location.hash = '#/dashboard';
    Router.resolve();
  }

  if (action === 'remove-exercise-from-day') {
    const day = Store.getWorkoutDay(btn.dataset.day);
    if (day) {
      day.exerciseIds = day.exerciseIds.filter(id => id !== btn.dataset.exercise);
      Store.save();
      Router.resolve();
    }
  }

  if (action === 'add-exercise-to-day') {
    const day = Store.getWorkoutDay(btn.dataset.day);
    if (day) {
      day.exerciseIds.push(btn.dataset.exercise);
      Store.save();
      Router.resolve();
    }
  }

  if (action === 'create-and-add-exercise') {
    const name = document.getElementById('newExName')?.value.trim();
    const muscle = document.getElementById('newExMuscle')?.value.trim();
    if (!name) return;
    const id = U.generateId(name);
    Store.addExercise({
      id, name, category: 'custom',
      muscleGroups: muscle ? [muscle] : ['General'],
      pb: null, pbHistory: []
    });
    const day = Store.getWorkoutDay(btn.dataset.day);
    if (day) {
      day.exerciseIds.push(id);
      Store.save();
    }
    Router.resolve();
  }

  if (action === 'save-day-name') {
    const newName = document.getElementById('dayNameInput')?.value.trim();
    if (newName) {
      Store.updateWorkoutDay(btn.dataset.day, { name: newName });
    }
    location.hash = '#/train';
  }

  if (action === 'delete-day') {
    showModal(`
      <h3 class="text-lg font-headline font-bold mb-3">Delete Workout Day?</h3>
      <p class="text-sm text-zinc-400 mb-6">This will remove the workout day but keep all exercises.</p>
      <div class="flex gap-3">
        <button class="flex-1 py-3 bg-surface-container-highest rounded-xl font-headline font-bold text-sm" data-action="close-modal">Cancel</button>
        <button class="flex-1 py-3 bg-error/20 text-error rounded-xl font-headline font-bold text-sm" data-action="confirm-delete-day" data-day="${btn.dataset.day}">Delete</button>
      </div>
    `);
  }

  if (action === 'confirm-delete-day') {
    Store.deleteWorkoutDay(btn.dataset.day);
    closeModal();
    location.hash = '#/train';
  }

  if (action === 'create-day') {
    const name = document.getElementById('newDayName')?.value.trim();
    if (!name) return;
    const selectedIcon = document.querySelector('.icon-option.bg-primary\\/20')?.dataset.icon || 'fitness_center';
    const selectedColor = document.querySelector('.color-option[class*="ring-2"]')?.dataset.color || 'primary';
    const id = U.generateId(name);
    Store.addWorkoutDay({ id, name, icon: selectedIcon, color: selectedColor, exerciseIds: [] });
    location.hash = '#/edit-day/' + id;
  }

  // Icon/Color selectors
  if (btn.classList.contains('icon-option')) {
    document.querySelectorAll('.icon-option').forEach(el => {
      el.className = el.className.replace(/bg-primary\/20 text-primary border-primary\/30/g, 'bg-surface-container-low text-zinc-400 border-outline-variant/10');
    });
    btn.className = btn.className.replace(/bg-surface-container-low text-zinc-400 border-outline-variant\/10/g, 'bg-primary/20 text-primary border-primary/30');
  }

  if (btn.classList.contains('color-option')) {
    document.querySelectorAll('.color-option').forEach(el => {
      el.className = el.className.replace(/ring-2 ring-\w+\/30/g, '');
    });
    btn.className += ' ring-2 ring-' + btn.dataset.color + '/30';
  }

  // Library tab switcher
  if (btn.classList.contains('lib-tab')) {
    document.querySelectorAll('.lib-tab').forEach(el => {
      el.className = 'lib-tab flex-1 py-2.5 rounded-xl font-headline font-bold text-sm uppercase tracking-widest bg-surface-container-low text-zinc-400 border border-outline-variant/10';
    });
    btn.className = 'lib-tab flex-1 py-2.5 rounded-xl font-headline font-bold text-sm uppercase tracking-widest bg-primary/20 text-primary border border-primary/30';
    const tab = btn.dataset.libTab;
    const container = document.getElementById('libContent');
    if (container) {
      if (tab === 'sessions') {
        container.innerHTML = Views._renderSessionJournal(Store.data.sessions);
      } else {
        container.innerHTML = Views._renderExerciseBrowse();
      }
    }
  }

  // Library filter pills
  if (btn.classList.contains('filter-pill')) {
    document.querySelectorAll('.filter-pill').forEach(el => {
      el.className = 'filter-pill bg-surface-container-low text-zinc-400 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase shrink-0 border border-outline-variant/10';
    });
    btn.className = 'filter-pill bg-primary/20 text-primary px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase shrink-0 border border-primary/30';
    const filter = btn.dataset.filter;
    const filtered = filter === 'all' ? Store.data.exercises : Store.data.exercises.filter(e => e.category === filter);
    const listEl = document.getElementById('exerciseList');
    if (listEl) listEl.innerHTML = Views._renderExerciseList(filtered);
  }
});

// Input event delegation for active workout
document.addEventListener('input', (e) => {
  const input = e.target;
  if (input.dataset.action === 'set-kg') {
    SessionManager.updateSet(input.dataset.exercise, parseInt(input.dataset.set), 'kg', input.value);
  }
  if (input.dataset.action === 'set-reps') {
    SessionManager.updateSet(input.dataset.exercise, parseInt(input.dataset.set), 'reps', input.value);
  }

  // Library search
  if (input.id === 'librarySearch') {
    const query = input.value.toLowerCase();
    const activeFilter = document.querySelector('.filter-pill.bg-primary\\/20')?.dataset.filter || 'all';
    let filtered = Store.data.exercises;
    if (activeFilter !== 'all') filtered = filtered.filter(e => e.category === activeFilter);
    if (query) filtered = filtered.filter(e => e.name.toLowerCase().includes(query) || e.muscleGroups.some(mg => mg.toLowerCase().includes(query)));
    const listEl = document.getElementById('exerciseList');
    if (listEl) listEl.innerHTML = Views._renderExerciseList(filtered);
  }
});

// File import handler
document.addEventListener('change', (e) => {
  if (e.target.id === 'importFileInput') {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (imported.exercises && imported.sessions && imported.workoutDays) {
          Store.data = imported;
          Store.save();
          showModal('<h3 class="text-lg font-headline font-bold mb-3 text-primary">Import Successful</h3><p class="text-sm text-zinc-400 mb-4">' + imported.sessions.length + ' sessions and ' + imported.exercises.length + ' exercises restored.</p><button class="w-full py-3 bg-primary/20 text-primary rounded-xl font-headline font-bold text-sm" data-action="close-modal-reload">OK</button>');
        } else {
          showModal('<h3 class="text-lg font-headline font-bold mb-3 text-error">Invalid File</h3><p class="text-sm text-zinc-400 mb-4">This doesn\'t look like a Kinetic Lab backup file.</p><button class="w-full py-3 bg-surface-container-highest rounded-xl font-headline font-bold text-sm" data-action="close-modal">OK</button>');
        }
      } catch(err) {
        showModal('<h3 class="text-lg font-headline font-bold mb-3 text-error">Import Failed</h3><p class="text-sm text-zinc-400 mb-4">Could not read the file. Make sure it\'s a valid JSON backup.</p><button class="w-full py-3 bg-surface-container-highest rounded-xl font-headline font-bold text-sm" data-action="close-modal">OK</button>');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }
});

// ============================================================
// MODAL
// ============================================================
function showModal(html) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = html;
  overlay.classList.remove('hidden');
  overlay.classList.add('flex');
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('flex');
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ============================================================
// INIT
// ============================================================
Store.load();
Router.init();
</script>
</body>
</html>
