      {id:'legs',name:'Legs',icon:'directions_run',color:'secondary',exerciseIds:['leg-extension','lunges-on-track','squats-kettlebells','leg-press','hack-squat-machine','prone-leg-curl','leg-curl-machine','calf-raise-free-weights','calfs-on-machine','outter-thigh-machine','backwards-lunges-bar']},
      {id:'shoulders-triceps',name:'Shoulders / Triceps',icon:'sports_martial_arts',color:'tertiary',exerciseIds:['shoulder-press-dumbbells','straight-bar-arm-raise','shoulder-shrugs','shoulder-press-machine','triceps-extension-machine','bar-pull-down','single-arm-raises-machine','skull-crushers','shoulder-lift-bar','dips']},
      {id:'cardio-abs',name:'Cardio / Abs',icon:'directions_bike',color:'error',exerciseIds:['cycling','incline-walk','crunches','sit-ups','leg-raises','plank','russian-twists','mountain-climbers','bicycle-crunches','ab-rollout']},

  getExercise(id) { return this.data.exercises.find(e => e.id === id); },
  getWorkoutDay(id) { return this.data.workoutDays.find(d => d.id === id); },
  getSession(id) { return this.data.sessions.find(s => s.id === id); },

  addExercise(exercise) {
    this.data.exercises.push(exercise);
    this.save();
  },

  addWorkoutDay(day) {
    this.data.workoutDays.push(day);
    this.save();
  },

  deleteWorkoutDay(id) {
    this.data.workoutDays = this.data.workoutDays.filter(d => d.id !== id);
    this.save();
  },

  updateWorkoutDay(id, updates) {
    const day = this.getWorkoutDay(id);
    if (day) Object.assign(day, updates);
    this.save();
  },
};

// ============================================================
// PB ENGINE
// ============================================================
const PBEngine = {
  checkPB(exerciseId, kg, reps) {
    const ex = Store.getExercise(exerciseId);
    if (!ex) return { isNewPb: false };
    kg = parseFloat(kg) || 0;
    reps = parseInt(reps) || 0;
    if (!ex.pb) return { isNewPb: (kg > 0 || reps > 0), oldPb: null };
    const exType = ex.type || 'strength';
    if (exType === 'cardio') {
      // For cardio: field1 (mins/secs) stored in kg, field2 (km/incline) stored in reps
      // PB = longer duration OR same duration with higher field2
      const isNew = (kg > ex.pb.kg) || (kg === ex.pb.kg && reps > ex.pb.reps);
      return { isNewPb: isNew, oldPb: {...ex.pb} };
    }
    if (exType === 'bodyweight') {
      // Bodyweight: only reps matter (kg=0)
      return { isNewPb: reps > ex.pb.reps, oldPb: {...ex.pb} };
    }
    // Strength: heavier weight wins, or same weight with more reps
    const isNew = (kg > ex.pb.kg) || (kg === ex.pb.kg && reps > ex.pb.reps);
    return { isNewPb: isNew, oldPb: {...ex.pb} };
  },

  recordPB(exerciseId, kg, reps, date) {
    const ex = Store.getExercise(exerciseId);
    if (!ex) return;
    const newPb = { kg: parseFloat(kg)||0, reps: parseInt(reps)||0, date: date || new Date().toISOString().slice(0,10) };
    ex.pbHistory.push(newPb);
    ex.pb = newPb;
    Store.save();
  }
};

// ============================================================
// SESSION MANAGER
// ============================================================
const SessionManager = {
  timerInterval: null,

  startSession(workoutDayId) {
    const day = Store.getWorkoutDay(workoutDayId);
    if (!day) return;
    Store.data.activeSession = {
      id: 'sess-' + Date.now(),
      workoutDayId,
      startTime: Date.now(),
      exercises: day.exerciseIds.map(eid => ({
        exerciseId: eid,
        sets: [{ kg: '', reps: '', completed: false, isNewPb: false }],
        newPb: false
      })),
      totalVolume: 0,
      pbsAchieved: 0
    };
    Store.save();
  },

  getActive() { return Store.data.activeSession; },

  addSet(exerciseId) {
    const session = this.getActive();
    if (!session) return;
    const ex = session.exercises.find(e => e.exerciseId === exerciseId);
    if (ex) {
      ex.sets.push({ kg: '', reps: '', completed: false, isNewPb: false });
      Store.save();
    }
  },

  removeSet(exerciseId, setIndex) {
    const session = this.getActive();
    if (!session) return;
    const ex = session.exercises.find(e => e.exerciseId === exerciseId);
    if (ex && ex.sets.length > 1) {
      ex.sets.splice(setIndex, 1);
      Store.save();
    }
  },

  updateSet(exerciseId, setIndex, field, value) {
    const session = this.getActive();
    if (!session) return;
    const ex = session.exercises.find(e => e.exerciseId === exerciseId);
    if (ex && ex.sets[setIndex]) {
      ex.sets[setIndex][field] = value;
      Store.save();
    }
  },

  completeSet(exerciseId, setIndex) {
    const session = this.getActive();
    if (!session) return { isNewPb: false };
    const ex = session.exercises.find(e => e.exerciseId === exerciseId);
    if (!ex || !ex.sets[setIndex]) return { isNewPb: false };
    const set = ex.sets[setIndex];
    set.completed = !set.completed;
    if (set.completed) {
      const ex = Store.getExercise(exerciseId);
      const exType = ex?.type || 'strength';
      const result = PBEngine.checkPB(exerciseId, set.kg, set.reps);
      const hasData = exType === 'bodyweight' ? set.reps !== '' : (exType === 'cardio' ? set.kg !== '' : (set.kg !== '' && set.reps !== ''));
      if (result.isNewPb && hasData) {
        set.isNewPb = true;
        ex.newPb = true;
        session.pbsAchieved = session.exercises.filter(e => e.newPb).length;
        PBEngine.recordPB(exerciseId, set.kg, set.reps);
      }
    }
    this.recalcVolume();
    Store.save();
    return { isNewPb: set.isNewPb };
  },

  recalcVolume() {
    const session = this.getActive();
    if (!session) return;
    let vol = 0;
    session.exercises.forEach(ex => {
      ex.sets.forEach(s => {
        if (s.completed) {
          vol += (parseFloat(s.kg)||0) * (parseInt(s.reps)||0);
        }
      });
    });
    session.totalVolume = vol;
  },

  finishSession() {
    const session = this.getActive();
    if (!session) return null;
    session.duration = Math.floor((Date.now() - session.startTime) / 1000);
    session.date = new Date(session.startTime).toISOString();
    this.recalcVolume();
    // Clean up incomplete sets
    session.exercises.forEach(ex => {
      ex.sets = ex.sets.filter(s => s.completed);
    });
    session.exercises = session.exercises.filter(ex => ex.sets.length > 0);
    Store.data.sessions.unshift(session);
    Store.data.activeSession = null;
    if (this.timerInterval) clearInterval(this.timerInterval);
    Store.save();
    return session;
  },

  cancelSession() {
    Store.data.activeSession = null;
    if (this.timerInterval) clearInterval(this.timerInterval);
    Store.save();
  },

  getElapsed() {
    const session = this.getActive();
    if (!session) return 0;
    return Math.floor((Date.now() - session.startTime) / 1000);
  }
};

// ============================================================
// UTILITIES
// ============================================================
const U = {
  formatDuration(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },
  formatVolume(kg) {
    if (kg >= 1000) return (kg/1000).toFixed(1).replace(/\.0$/,'') + 'k';
    return kg.toLocaleString();
  },
  timeAgo(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    if (diff < 7) return diff + ' days ago';
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  },
  formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'2-digit' });
  },
  generateId(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') + '-' + Date.now().toString(36);
  },
  getCompletedSets(session) {
    let count = 0;
    session.exercises.forEach(ex => { ex.sets.forEach(s => { if (s.completed) count++; }); });
    return count;
  },
  getTotalSets(session) {
    let count = 0;
    session.exercises.forEach(ex => { count += ex.sets.length; });
    return count;
  },
  getWeekSessions() {
    const now = new Date();
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - now.getDay() + 1);
    weekStart.setHours(0,0,0,0);
    return Store.data.sessions.filter(s => new Date(s.date) >= weekStart);
  },
  getStreak() {
    const sessions = Store.data.sessions;
    if (!sessions.length) return 0;
    let streak = 0;
    const today = new Date();
    today.setHours(0,0,0,0);
    let checkDate = new Date(today);
    // Check if trained today
    const trainedToday = sessions.some(s => {
      const sd = new Date(s.date); sd.setHours(0,0,0,0);
      return sd.getTime() === today.getTime();
    });
    if (!trainedToday) checkDate.setDate(checkDate.getDate() - 1);
    for (let i = 0; i < 365; i++) {
      const found = sessions.some(s => {
        const sd = new Date(s.date); sd.setHours(0,0,0,0);
        return sd.getTime() === checkDate.getTime();
      });
      if (found) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
      else break;
    }
    return streak;
  },
  getMonthPBs() {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    let count = 0;
    Store.data.exercises.forEach(ex => {
      ex.pbHistory.forEach(pb => {
        if (new Date(pb.date) >= monthStart) count++;
      });
    });
    return count;
  },
  getWeekVolume() {
    return this.getWeekSessions().reduce((sum, s) => sum + (s.totalVolume || 0), 0);
  }
};

  sessionDetail(sessionId) {

    const day = Store.getWorkoutDay(session.workoutDayId);

    topTitle.textContent = 'SESSION DETAIL';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    return `
      <section class="mb-8">
        <div class="flex flex-col gap-1 mb-6">
          <span class="text-primary font-headline font-bold tracking-[0.2em] text-[10px] uppercase">${U.formatDate(session.date)}</span>
          <h1 class="text-4xl font-headline font-black tracking-tighter text-white leading-none">${(day?.name || 'WORKOUT').toUpperCase()}</h1>

        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2 glass p-5 rounded-xl border border-outline-variant/10">
            <span class="text-zinc-400 font-label text-xs uppercase tracking-widest mb-1 block">Total Volume</span>
            <div class="flex items-baseline gap-2">
              <span class="text-4xl font-headline font-black text-primary">${session.totalVolume.toLocaleString()}</span>
              <span class="text-lg font-headline font-bold text-zinc-500">KG</span>

          </div>
          <div class="glass p-4 rounded-xl border border-outline-variant/10">

          <div class="glass p-4 rounded-xl border border-outline-variant/10">
            <span class="text-zinc-400 font-label text-xs uppercase tracking-widest mb-1 block">PBs</span>

        <h2 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase">Exercise Breakdown</h2>

          const ex = Store.getExercise(sessionEx.exerciseId);
          if (!ex) return '';
          return `
            <div class="${sessionEx.newPb ? 'border-l-2 border-primary' : ''} bg-surface-container-low p-4 rounded-xl space-y-3">
              <div class="flex justify-between items-start">

                  ${sessionEx.newPb ? '<span class="bg-primary text-black text-[8px] font-black px-1.5 py-0.5 rounded-sm tracking-tighter uppercase italic shadow-[0_0_10px_rgba(156,255,147,0.5)] inline-block mb-1">NEW PB</span>' : ''}
                  <h3 class="text-base font-headline font-bold text-white">${ex.name}</h3>
                </div>
              </div>
              <div class="space-y-1.5">
                ${sessionEx.sets.map((set, i) => {
                  const exType = ex.type || 'strength';
                  let setText = '';
                  if (exType === 'cardio') {
                    const l1 = ex.inputLabels?.field1?.toLowerCase() || 'mins';
                    const l2 = ex.inputLabels?.field2?.toLowerCase() || '';
                    setText = l2 ? `${set.kg}${l1} / ${set.reps}${l2}` : `${set.kg}${l1}`;
                  } else if (exType === 'bodyweight') {
                    setText = `${set.reps} reps`;
                  } else {

  // ---- EXERCISE LIBRARY ----
  library() {
    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'LIBRARY';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const categories = [...new Set(Store.data.exercises.map(e => e.category))];

    return `
      <section class="space-y-4">
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 text-lg">search</span>
          <input id="librarySearch" type="text" placeholder="Search exercises..." class="w-full bg-surface-container-low border border-outline-variant/10 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-1 focus:ring-primary/40 focus:border-primary/40 placeholder:text-zinc-600"/>
        </div>
        <div id="filterPills" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
          <button class="filter-pill bg-primary/20 text-primary px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase shrink-0 border border-primary/30" data-filter="all">All</button>
          ${categories.map(c => `<button class="filter-pill bg-surface-container-low text-zinc-400 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase shrink-0 border border-outline-variant/10" data-filter="${c}">${c}</button>`).join('')}
        </div>
        <div id="exerciseList" class="space-y-2">
          ${this._renderExerciseList(Store.data.exercises)}
        </div>
      </section>
    `;
  },

  _renderPBHero(ex) {
    const exType = ex.type || 'strength';
    let pbDisplay = '';
    if (exType === 'cardio') {
      const l1 = ex.inputLabels?.field1?.toLowerCase() || 'mins';
      const l2 = ex.inputLabels?.field2?.toLowerCase() || '';
      pbDisplay = l2
        ? '<span class="text-5xl font-headline font-black text-white">' + ex.pb.kg + '</span><span class="text-xl font-headline text-zinc-400">' + l1 + '</span><span class="text-2xl text-zinc-600 mx-1">/</span><span class="text-5xl font-headline font-black text-white">' + ex.pb.reps + '</span><span class="text-xl font-headline text-zinc-400">' + l2 + '</span>'
        : '<span class="text-5xl font-headline font-black text-white">' + ex.pb.kg + '</span><span class="text-xl font-headline text-zinc-400">' + l1 + '</span>';
    } else if (exType === 'bodyweight') {
      pbDisplay = '<span class="text-5xl font-headline font-black text-white">' + ex.pb.reps + '</span><span class="text-xl font-headline text-zinc-400">reps</span>';
    } else {
      pbDisplay = (ex.pb.kg > 0 ? '<span class="text-5xl font-headline font-black text-white">' + ex.pb.kg + '</span><span class="text-xl font-headline text-zinc-400">kg</span><span class="text-2xl text-zinc-600 mx-1">x</span>' : '') + '<span class="text-5xl font-headline font-black text-white">' + ex.pb.reps + '</span><span class="text-xl font-headline text-zinc-400">reps</span>';
    }
    return '<div class="bg-gradient-to-br from-primary/10 to-primary/5 p-6 rounded-2xl border border-primary/20 text-center"><span class="text-[10px] text-primary uppercase tracking-widest font-bold block mb-2">Current Personal Best</span><div class="flex items-baseline justify-center gap-2">' + pbDisplay + '</div><p class="text-xs text-zinc-500 mt-2">' + U.formatDate(ex.pb.date) + '</p></div>';
  },

  _formatPBText(ex) {
    if (!ex.pb) return 'No PB';
    const exType = ex.type || 'strength';
    if (exType === 'cardio') {
      const l1 = ex.inputLabels?.field1?.toLowerCase() || 'mins';
      const l2 = ex.inputLabels?.field2?.toLowerCase() || '';
      if (!l2) return `${ex.pb.kg}${l1}`;
      return `${ex.pb.kg}${l1} / ${ex.pb.reps}${l2}`;
    }
    if (exType === 'bodyweight') {
      return `${ex.pb.reps} reps`;
    }
    return `${ex.pb.kg > 0 ? ex.pb.kg+'kg x ' : ''}${ex.pb.reps} reps`;
  },

  _renderExerciseList(exercises) {
    return exercises.map(ex => {
      const pbText = ex.pb ? this._formatPBText(ex) : 'No PB';
      return `
        <a href="#/library/${ex.id}" class="bg-surface-container-low p-4 rounded-xl flex items-center justify-between active:bg-surface-container-high transition-all block">
          <div class="min-w-0 mr-3">
            <h4 class="font-headline font-bold text-sm truncate">${ex.name}</h4>
            <div class="flex items-center gap-2 mt-0.5">
              ${ex.muscleGroups.slice(0,2).map(mg => `<span class="text-[9px] text-zinc-500 uppercase tracking-wider">${mg}</span>`).join('<span class="text-zinc-700">&middot;</span>')}
            </div>
          </div>
          <div class="text-right shrink-0">
            <p class="text-xs font-headline font-bold ${ex.pb ? 'text-primary' : 'text-zinc-600'}">${pbText}</p>
          </div>
        </a>`;
    }).join('');
  },

  // ---- EXERCISE DETAIL ----
  exerciseDetail(exerciseId) {
    const ex = Store.getExercise(exerciseId);
    if (!ex) return '<p class="text-center text-zinc-500 py-20">Exercise not found</p>';

    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'EXERCISE';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const history = [...ex.pbHistory].reverse();

    return `
      <section class="space-y-6">
        <div class="text-center py-6">
          <h2 class="text-2xl font-headline font-bold tracking-tight">${ex.name}</h2>
          <div class="flex justify-center gap-2 mt-2">
            ${ex.muscleGroups.map(mg => `<span class="bg-secondary/10 text-secondary text-[10px] px-2.5 py-0.5 rounded-full font-bold tracking-wider uppercase">${mg}</span>`).join('')}
          </div>
        </div>

        ${ex.pb ? Views._renderPBHero(ex) : '<div class="bg-surface-container-low p-6 rounded-2xl text-center"><span class="text-zinc-500 font-headline font-bold">No PB recorded yet</span></div>'}

        ${history.length > 0 ? `
          <div>
            <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">PB History</h3>
            <div class="space-y-2">
              ${history.map((pb, i) => {
                const exType = ex.type || 'strength';
                let pbStr = '';
                if (exType === 'cardio') {
                  const l1 = ex.inputLabels?.field1?.toLowerCase() || 'mins';
                  const l2 = ex.inputLabels?.field2?.toLowerCase() || '';
                  pbStr = l2 ? `${pb.kg}${l1} / ${pb.reps}${l2}` : `${pb.kg}${l1}`;
                } else if (exType === 'bodyweight') {
                  pbStr = `${pb.reps} reps`;
                } else {
                  pbStr = `${pb.kg > 0 ? pb.kg+'kg x ' : ''}${pb.reps} reps`;
                }
                return `
                <div class="flex items-center justify-between bg-surface-container-low p-3 rounded-xl ${i === 0 ? 'border border-primary/10' : ''}">
                  <span class="text-xs text-zinc-500">${U.formatDate(pb.date)}</span>
                  <span class="font-headline font-bold text-sm ${i === 0 ? 'text-primary' : ''}">${pbStr}</span>
                </div>`;
              }).join('')}
            </div>
          </div>
        ` : ''}
      </section>
    `;
  },

  // ---- STATS ----
  stats() {
    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'STATS';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const sessions = Store.data.sessions;
    const totalVol = sessions.reduce((sum, s) => sum + (s.totalVolume || 0), 0);
    const totalPBs = Store.data.exercises.reduce((sum, ex) => sum + ex.pbHistory.length, 0);
    const avgDuration = sessions.length ? Math.round(sessions.reduce((sum, s) => sum + (s.duration || 0), 0) / sessions.length) : 0;

    // Workout distribution
    const distribution = {};
    sessions.forEach(s => {
      const day = Store.getWorkoutDay(s.workoutDayId);
      const name = day?.name || 'Other';
      distribution[name] = (distribution[name] || 0) + 1;
    });

    // Recent PBs
    const recentPBs = [];
    Store.data.exercises.forEach(ex => {
      ex.pbHistory.forEach(pb => {
        recentPBs.push({ name: ex.name, exerciseId: ex.id, ...pb });
      });
    });
    recentPBs.sort((a, b) => new Date(b.date) - new Date(a.date));

    return `
      <section class="space-y-6">
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/5">
            <span class="material-symbols-outlined text-primary mb-2 text-xl">fitness_center</span>
            <p class="text-2xl font-headline font-black">${U.formatVolume(totalVol)}</p>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-0.5">Total Volume (kg)</p>
          </div>
          <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/5">
            <span class="material-symbols-outlined text-secondary mb-2 text-xl">calendar_month</span>
            <p class="text-2xl font-headline font-black">${sessions.length}</p>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-0.5">Total Sessions</p>
          </div>
          <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/5">
            <span class="material-symbols-outlined text-tertiary mb-2 text-xl">timer</span>
            <p class="text-2xl font-headline font-black">${Math.floor(avgDuration/60)}<span class="text-sm text-zinc-500">m</span></p>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-0.5">Avg Duration</p>
          </div>
          <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/5">
            <span class="material-symbols-outlined text-primary mb-2 text-xl">emoji_events</span>
            <p class="text-2xl font-headline font-black">${totalPBs}</p>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-0.5">Total PBs</p>
          </div>
        </div>

        ${Object.keys(distribution).length > 0 ? `
          <div>
            <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Workout Distribution</h3>
            <div class="space-y-3">
              ${Object.entries(distribution).map(([name, count]) => {
                const maxCount = Math.max(...Object.values(distribution));
                const pct = Math.round((count/maxCount)*100);
                return `
                  <div>
                    <div class="flex justify-between text-sm mb-1">
                      <span class="font-headline font-bold text-xs uppercase tracking-wider">${name}</span>
                      <span class="text-zinc-400 text-xs">${count} sessions</span>
                    </div>
                    <div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
                      <div class="h-full bg-primary rounded-full" style="width:${pct}%"></div>
                    </div>
                  </div>`;
              }).join('')}
            </div>
          </div>
        ` : ''}

        ${recentPBs.length > 0 ? `
          <div>
            <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Recent PBs</h3>
            <div class="space-y-2">
              ${recentPBs.slice(0, 10).map(pb => {
                const ex = Store.getExercise(pb.exerciseId);
                const pbStr = ex ? Views._formatPBText(ex) : `${pb.kg > 0 ? pb.kg+'kg x ' : ''}${pb.reps} reps`;
                return `
                <div class="flex items-center justify-between bg-surface-container-low p-3 rounded-xl">
                  <div>
                    <span class="font-headline font-bold text-sm">${pb.name}</span>
                    <span class="text-[10px] text-zinc-500 block">${U.formatDate(pb.date)}</span>
                  </div>
                  <span class="text-primary font-headline font-bold text-sm">${pbStr}</span>
                </div>`;
              }).join('')}
            </div>
          </div>
        ` : ''}
      </section>
    `;
  },

  // ---- EDIT WORKOUT DAY ----
  editDay(dayId) {
    const day = Store.getWorkoutDay(dayId);
    if (!day) return '<p class="text-center text-zinc-500 py-20">Day not found</p>';

    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'EDIT DAY';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const allExercises = Store.data.exercises;
    const dayExercises = day.exerciseIds.map(id => Store.getExercise(id)).filter(Boolean);
    const availableExercises = allExercises.filter(e => !day.exerciseIds.includes(e.id));

    return `
      <section class="space-y-6">
        <div>
          <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold block mb-2">Day Name</label>
          <input id="dayNameInput" type="text" value="${day.name}" class="w-full bg-surface-container-low border border-outline-variant/10 rounded-xl px-4 py-3 text-sm font-headline font-bold focus:ring-1 focus:ring-primary/40"/>
        </div>

        <div>
          <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Current Exercises (${dayExercises.length})</h3>
          <div id="currentExercises" class="space-y-2">
            ${dayExercises.map((ex, i) => `
              <div class="flex items-center justify-between bg-surface-container-low p-3 rounded-xl">
                <div class="flex items-center gap-3">
                  <span class="text-zinc-500 font-headline font-bold text-xs w-5">${i+1}</span>
                  <span class="font-headline font-bold text-sm">${ex.name}</span>
                </div>
                <button class="w-8 h-8 rounded-full bg-error/10 flex items-center justify-center text-error active:scale-90 transition-transform" data-action="remove-exercise-from-day" data-day="${dayId}" data-exercise="${ex.id}">
                  <span class="material-symbols-outlined text-base">remove</span>
                </button>
              </div>
            `).join('')}
          </div>
        </div>

        ${availableExercises.length > 0 ? `
          <div>
            <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Add Existing Exercise</h3>
            <div class="space-y-2">
              ${availableExercises.map(ex => `
                <div class="flex items-center justify-between bg-surface-container-low p-3 rounded-xl">
                  <span class="font-headline font-bold text-sm text-zinc-400">${ex.name}</span>
                  <button class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary active:scale-90 transition-transform" data-action="add-exercise-to-day" data-day="${dayId}" data-exercise="${ex.id}">
                    <span class="material-symbols-outlined text-base">add</span>
                  </button>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}

        <div class="border-t border-outline-variant/10 pt-4">
          <h3 class="text-zinc-400 font-headline font-bold text-xs tracking-widest uppercase mb-3">Create New Exercise</h3>
          <div class="space-y-3">
            <input id="newExName" type="text" placeholder="Exercise name" class="w-full bg-surface-container-low border border-outline-variant/10 rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-primary/40 placeholder:text-zinc-600"/>
            <input id="newExMuscle" type="text" placeholder="Muscle group (e.g. Chest, Quads)" class="w-full bg-surface-container-low border border-outline-variant/10 rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-primary/40 placeholder:text-zinc-600"/>
            <button class="w-full py-3 bg-primary/10 text-primary rounded-xl font-headline font-bold text-sm uppercase tracking-widest active:bg-primary/20 transition-all" data-action="create-and-add-exercise" data-day="${dayId}">
              Create &amp; Add Exercise
            </button>
          </div>
        </div>

        <button class="w-full py-3 bg-gradient-to-r from-primary to-primary-container text-surface-container-lowest font-headline font-bold uppercase tracking-widest rounded-full active:scale-[0.98] transition-all text-sm" data-action="save-day-name" data-day="${dayId}">
          Save Changes
        </button>

        <button class="w-full py-3 text-error/70 font-headline font-bold uppercase tracking-widest text-xs active:text-error transition-colors" data-action="delete-day" data-day="${dayId}">
          Delete Workout Day
        </button>
      </section>
    `;
  },

  // ---- ADD NEW WORKOUT DAY ----
  addDay() {
    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = 'NEW DAY';
    topTitle.className = 'text-sm font-bold tracking-widest text-zinc-400 font-headline uppercase';

    const icons = ['fitness_center','directions_run','sports_martial_arts','self_improvement','pool','hiking','rowing','sports_gymnastics'];
    const colors = ['primary','secondary','tertiary','error'];

    return `
      <section class="space-y-6">
        <div>
          <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold block mb-2">Day Name</label>
          <input id="newDayName" type="text" placeholder="e.g. Back & Biceps" class="w-full bg-surface-container-low border border-outline-variant/10 rounded-xl px-4 py-3 text-sm font-headline font-bold focus:ring-1 focus:ring-primary/40 placeholder:text-zinc-600"/>
        </div>

        <div>
          <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold block mb-2">Icon</label>
          <div class="flex flex-wrap gap-2" id="iconSelector">
            ${icons.map((icon, i) => `
              <button class="w-11 h-11 rounded-xl ${i===0?'bg-primary/20 text-primary border-primary/30':'bg-surface-container-low text-zinc-400 border-outline-variant/10'} border flex items-center justify-center active:scale-90 transition-all icon-option" data-icon="${icon}">
                <span class="material-symbols-outlined">${icon}</span>
              </button>
            `).join('')}
          </div>
        </div>

        <div>
          <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold block mb-2">Color</label>
          <div class="flex gap-2" id="colorSelector">
            ${colors.map((color, i) => `
              <button class="w-11 h-11 rounded-xl bg-${color}/20 border ${i===0?'border-'+color+'/50 ring-2 ring-'+color+'/30':'border-'+color+'/20'} flex items-center justify-center active:scale-90 transition-all color-option" data-color="${color}">
                <div class="w-4 h-4 rounded-full bg-${color}"></div>
              </button>
            `).join('')}
          </div>
        </div>

        <button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-surface-container-lowest font-headline font-black uppercase tracking-[0.15em] rounded-full active:scale-[0.98] transition-all text-sm" data-action="create-day">
          Create Workout Day
        </button>
      </section>
    `;
  }
};

// ============================================================
// GLOBAL EVENT DELEGATION
// ============================================================
document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'toggle-set') {
    const exerciseId = btn.dataset.exercise;
    const setIndex = parseInt(btn.dataset.set);
    const result = SessionManager.completeSet(exerciseId, setIndex);
    Router.resolve(); // re-render
    if (result.isNewPb) {
      setTimeout(() => {
        const el = document.getElementById('ex-' + exerciseId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
  }

  if (action === 'add-set') {
    SessionManager.addSet(btn.dataset.exercise);
    Router.resolve();
  }

  if (action === 'finish-workout') {
    const session = SessionManager.finishSession();
    if (session) {
      location.hash = '#/history/' + session.id;
    }
  }

  if (action === 'cancel-workout') {
    showModal(`
      <h3 class="text-lg font-headline font-bold mb-3">Cancel Session?</h3>
      <p class="text-sm text-zinc-400 mb-6">All progress from this session will be lost.</p>
      <div class="flex gap-3">
        <button class="flex-1 py-3 bg-surface-container-highest rounded-xl font-headline font-bold text-sm" data-action="close-modal">Keep Going</button>
        <button class="flex-1 py-3 bg-error/20 text-error rounded-xl font-headline font-bold text-sm" data-action="confirm-cancel">Cancel It</button>
      </div>
    `);
  }

  if (action === 'confirm-cancel') {
    SessionManager.cancelSession();
    closeModal();
    location.hash = '#/train';
  }

  if (action === 'close-modal') {
    closeModal();
  }

  if (action === 'remove-exercise-from-day') {
    const day = Store.getWorkoutDay(btn.dataset.day);
    if (day) {
      day.exerciseIds = day.exerciseIds.filter(id => id !== btn.dataset.exercise);
      Store.save();
      Router.resolve();
    }
  }

  if (action === 'add-exercise-to-day') {
    const day = Store.getWorkoutDay(btn.dataset.day);
    if (day) {
      day.exerciseIds.push(btn.dataset.exercise);
      Store.save();
      Router.resolve();
    }
  }

  if (action === 'create-and-add-exercise') {
    const name = document.getElementById('newExName')?.value.trim();
    const muscle = document.getElementById('newExMuscle')?.value.trim();
    if (!name) return;
    const id = U.generateId(name);
    Store.addExercise({
      id, name, category: 'custom',
      muscleGroups: muscle ? [muscle] : ['General'],
      pb: null, pbHistory: []
    });
    const day = Store.getWorkoutDay(btn.dataset.day);
    if (day) {
      day.exerciseIds.push(id);
      Store.save();
    }
    Router.resolve();
  }

  if (action === 'save-day-name') {
    const newName = document.getElementById('dayNameInput')?.value.trim();
    if (newName) {
      Store.updateWorkoutDay(btn.dataset.day, { name: newName });
    }
    location.hash = '#/train';
  }

  if (action === 'delete-day') {
    showModal(`
      <h3 class="text-lg font-headline font-bold mb-3">Delete Workout Day?</h3>
      <p class="text-sm text-zinc-400 mb-6">This will remove the workout day but keep all exercises.</p>
      <div class="flex gap-3">
        <button class="flex-1 py-3 bg-surface-container-highest rounded-xl font-headline font-bold text-sm" data-action="close-modal">Cancel</button>
        <button class="flex-1 py-3 bg-error/20 text-error rounded-xl font-headline font-bold text-sm" data-action="confirm-delete-day" data-day="${btn.dataset.day}">Delete</button>
      </div>
    `);
  }

  if (action === 'confirm-delete-day') {
    Store.deleteWorkoutDay(btn.dataset.day);
    closeModal();
    location.hash = '#/train';
  }

  if (action === 'create-day') {
    const name = document.getElementById('newDayName')?.value.trim();
    if (!name) return;
    const selectedIcon = document.querySelector('.icon-option.bg-primary\\/20')?.dataset.icon || 'fitness_center';
    const selectedColor = document.querySelector('.color-option[class*="ring-2"]')?.dataset.color || 'primary';
    const id = U.generateId(name);
    Store.addWorkoutDay({ id, name, icon: selectedIcon, color: selectedColor, exerciseIds: [] });
    location.hash = '#/edit-day/' + id;
  }

  // Icon/Color selectors
  if (btn.classList.contains('icon-option')) {
    document.querySelectorAll('.icon-option').forEach(el => {
      el.className = el.className.replace(/bg-primary\/20 text-primary border-primary\/30/g, 'bg-surface-container-low text-zinc-400 border-outline-variant/10');
    });
    btn.className = btn.className.replace(/bg-surface-container-low text-zinc-400 border-outline-variant\/10/g, 'bg-primary/20 text-primary border-primary/30');
  }

  if (btn.classList.contains('color-option')) {
    document.querySelectorAll('.color-option').forEach(el => {
      el.className = el.className.replace(/ring-2 ring-\w+\/30/g, '');
    });
    btn.className += ' ring-2 ring-' + btn.dataset.color + '/30';
  }

  // Library filter pills
  if (btn.classList.contains('filter-pill')) {
    document.querySelectorAll('.filter-pill').forEach(el => {
      el.className = 'filter-pill bg-surface-container-low text-zinc-400 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase shrink-0 border border-outline-variant/10';
    });
    btn.className = 'filter-pill bg-primary/20 text-primary px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase shrink-0 border border-primary/30';
    const filter = btn.dataset.filter;
    const filtered = filter === 'all' ? Store.data.exercises : Store.data.exercises.filter(e => e.category === filter);
    const listEl = document.getElementById('exerciseList');
    if (listEl) listEl.innerHTML = Views._renderExerciseList(filtered);
  }
});

// Input event delegation for active workout
document.addEventListener('input', (e) => {
  const input = e.target;
  if (input.dataset.action === 'set-kg') {
    SessionManager.updateSet(input.dataset.exercise, parseInt(input.dataset.set), 'kg', input.value);
  }
  if (input.dataset.action === 'set-reps') {
    SessionManager.updateSet(input.dataset.exercise, parseInt(input.dataset.set), 'reps', input.value);
  }

  // Library search
  if (input.id === 'librarySearch') {
    const query = input.value.toLowerCase();
    const activeFilter = document.querySelector('.filter-pill.bg-primary\\/20')?.dataset.filter || 'all';
    let filtered = Store.data.exercises;
    if (activeFilter !== 'all') filtered = filtered.filter(e => e.category === activeFilter);
    if (query) filtered = filtered.filter(e => e.name.toLowerCase().includes(query) || e.muscleGroups.some(mg => mg.toLowerCase().includes(query)));
    const listEl = document.getElementById('exerciseList');
    if (listEl) listEl.innerHTML = Views._renderExerciseList(filtered);
  }
});

// ============================================================
// MODAL
// ============================================================
function showModal(html) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = html;
  overlay.classList.remove('hidden');
  overlay.classList.add('flex');
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('flex');
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ============================================================
// INIT
// ============================================================
Store.load();
Router.init();
</script>
</body>
</html>
